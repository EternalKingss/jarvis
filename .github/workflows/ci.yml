name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r jarvis-mcp/requirements.txt
          pip install pytest ruff
      - name: Lint
        run: ruff check jarvis-mcp tests
      - name: Smoke test
        run: pytest tests -q
